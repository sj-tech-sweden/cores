name: Release Migrations Image On Labeled Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  packages: write
  pull-requests: read

concurrency:
  group: release-migrations-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cores-migrations
      MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}

    steps:
      - name: Resolve release bump from PR labels
        id: bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: |
          bump=""
          if [[ "$LABELS" == *"major"* ]]; then
            bump="major"
          elif [[ "$LABELS" == *"minor"* ]]; then
            bump="minor"
          elif [[ "$LABELS" == *"patch"* ]]; then
            bump="patch"
          fi

          if [[ -z "$bump" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

      - name: Stop when no release label is present
        if: steps.bump.outputs.should_release != 'true'
        run: echo "No patch/minor/major label found. Skipping release."

      - name: Check out merged commit
        if: steps.bump.outputs.should_release == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.MERGE_SHA }}

      - name: Configure git identity
        if: steps.bump.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute next semantic version
        if: steps.bump.outputs.should_release == 'true'
        id: version
        run: |
          latest_tag=$(git tag -l 'v*' --sort=-version:refname | head -n 1)
          if [[ -z "$latest_tag" ]]; then
            latest_tag="v0.0.0"
          fi

          version_core="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version_core"

          case "${{ steps.bump.outputs.bump }}" in
            major)
              major=$((major + 1)); minor=0; patch=0 ;;
            minor)
              minor=$((minor + 1)); patch=0 ;;
            patch)
              patch=$((patch + 1)) ;;
          esac

          new_version="${major}.${minor}.${patch}"
          new_tag="v${new_version}"

          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        if: steps.bump.outputs.should_release == 'true'
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.new_tag }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ steps.version.outputs.new_tag }}"
            exit 1
          fi
          git tag -a "${{ steps.version.outputs.new_tag }}" "$MERGE_SHA" -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Create GitHub release
        if: steps.bump.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.new_tag }}" \
            --target "$MERGE_SHA" \
            --title "${{ steps.version.outputs.new_tag }}" \
            --generate-notes

      - name: Log in to GHCR
        if: steps.bump.outputs.should_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.bump.outputs.should_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push migrations image
        if: steps.bump.outputs.should_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrations
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.new_version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.MERGE_SHA }}
            org.opencontainers.image.version=${{ steps.version.outputs.new_version }}
            org.opencontainers.image.title=cores-migrations
