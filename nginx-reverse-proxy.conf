# Nginx Reverse Proxy Configuration for Lager Weidelbach Stack
# Place this file in /etc/nginx/sites-available/ and create a symlink to sites-enabled/
# sudo ln -s /etc/nginx/sites-available/lager-weidelbach.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

# =============================================================================
# RentalCore - Auftragsmanagement
# =============================================================================
server {
    listen 80;
    server_name rent.server-nt.de;

    # Redirect to HTTPS (uncomment when SSL is configured)
    # return 301 https://$server_name$request_uri;

    # Proxy settings
    location / {
        proxy_pass http://localhost:8081;
        proxy_http_version 1.1;

        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Cache control
        proxy_cache_bypass $http_upgrade;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:8081/health;
        access_log off;
    }

    # Optional: Custom error pages
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /var/www/errors;
        internal;
    }
}

