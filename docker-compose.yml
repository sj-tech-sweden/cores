name: lager_weidelbach
services:
  # ============================================================================
  # SQLite Database Migration - Runs only if databases don't exist
  # ============================================================================
  db-init:
    image: alpine:latest
    container_name: db-init
    volumes:
      - sqlite-data:/data
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        echo "🗄️  Checking SQLite databases..."
        mkdir -p /data/backups
        
        # Create empty databases if they don't exist
        if [ ! -f /data/rentalcore.db ]; then
          echo "📦 Creating empty RentalCore database..."
          touch /data/rentalcore.db
          chmod 666 /data/rentalcore.db
          echo "✅ RentalCore database created"
        else
          echo "✅ RentalCore database exists"
        fi
        
        if [ ! -f /data/warehousecore.db ]; then
          echo "📦 Creating empty WarehouseCore database..."
          touch /data/warehousecore.db
          chmod 666 /data/warehousecore.db
          echo "✅ WarehouseCore database created"
        else
          echo "✅ WarehouseCore database exists"
        fi
        
        # Set permissions
        chmod -R 777 /data
        echo "🎉 Database initialization complete!"
    networks:
      - weidelbach

  # ============================================================================
  # RentalCore - Rental Management System (SQLite)
  # ============================================================================
  rentalcore:
    image: nobentie/rentalcore:latest
    container_name: rentalcore
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      # Domain configuration for cross-navigation (without protocol or port)
      RENTALCORE_DOMAIN: "${RENTALCORE_DOMAIN:-}"
      WAREHOUSECORE_DOMAIN: "${WAREHOUSECORE_DOMAIN:-}"
      # Cookie domain for SSO (e.g., .example.com for subdomains, leave empty for localhost)
      COOKIE_DOMAIN: "${COOKIE_DOMAIN:-}"
      # SQLite Database Configuration
      DB_PATH: "/data/rentalcore.db"
      DB_JOURNAL_MODE: "WAL"
      DB_SYNCHRONOUS: "NORMAL"
      DB_CACHE_SIZE: "-64000"
      DB_BUSY_TIMEOUT: "5000"
      # Nextcloud File Pool (WebDAV)
      NEXTCLOUD_WEBDAV_URL: "${NEXTCLOUD_WEBDAV_URL:-}"
      NEXTCLOUD_WEBDAV_USER: "${NEXTCLOUD_WEBDAV_USER:-}"
      NEXTCLOUD_WEBDAV_PASSWORD: "${NEXTCLOUD_WEBDAV_PASSWORD:-}"
      NEXTCLOUD_WEBDAV_BASE_PATH: "${NEXTCLOUD_WEBDAV_BASE_PATH:-rentalcore-filepool}"
      NEXTCLOUD_BACKFILL_ON_START: "${NEXTCLOUD_BACKFILL_ON_START:-true}"
      # App port
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8081"
      # OCR Parser Configuration
      OCR_USE_PYTHON: "${OCR_USE_PYTHON:-true}"
    ports:
      - "8081:8081"
    volumes:
      - sqlite-data:/data
    networks:
      - weidelbach
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ============================================================================
  # WarehouseCore - Warehouse Management System (SQLite)
  # ============================================================================
  warehousecore:
    image: nobentie/warehousecore:latest
    container_name: warehousecore
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
      mosquitto:
        condition: service_started
    environment:
      # Domain configuration for cross-navigation (without protocol or port)
      RENTALCORE_DOMAIN: "${RENTALCORE_DOMAIN:-}"
      WAREHOUSECORE_DOMAIN: "${WAREHOUSECORE_DOMAIN:-}"
      # Cookie domain for SSO (e.g., .example.com for subdomains, leave empty for localhost)
      COOKIE_DOMAIN: "${COOKIE_DOMAIN:-}"
      # SQLite Database Configuration
      DB_PATH: "/data/warehousecore.db"
      DB_JOURNAL_MODE: "WAL"
      DB_SYNCHRONOUS: "NORMAL"
      DB_CACHE_SIZE: "-64000"
      DB_BUSY_TIMEOUT: "5000"
      # App port
      PORT: "8082"
      # Nextcloud File Pool (shared with RentalCore) for product pictures
      NEXTCLOUD_WEBDAV_URL: "${NEXTCLOUD_WEBDAV_URL:-}"
      NEXTCLOUD_WEBDAV_USER: "${NEXTCLOUD_WEBDAV_USER:-}"
      NEXTCLOUD_WEBDAV_PASSWORD: "${NEXTCLOUD_WEBDAV_PASSWORD:-}"
      NEXTCLOUD_WEBDAV_BASE_PATH: "${NEXTCLOUD_WEBDAV_BASE_PATH:-rentalcore-filepool}"
      # LED MQTT Configuration
      LED_MQTT_HOST: "${LED_MQTT_HOST:-mosquitto}"
      LED_MQTT_PORT: "${LED_MQTT_PORT:-1883}"
      LED_MQTT_TLS: "${LED_MQTT_TLS:-false}"
      LED_MQTT_USER: "${LED_MQTT_USER:-leduser}"
      LED_MQTT_PASS: "${LED_MQTT_PASS:-ledpassword123}"
      LED_MQTT_TOPIC_PREFIX: "${LED_MQTT_TOPIC_PREFIX:-weidelbach}"
      LED_WAREHOUSE_ID: "${LED_WAREHOUSE_ID:-weidelbach}"
      LED_MAPPING_FILE: "${LED_MAPPING_FILE:-/var/lib/warehousecore/led/led_mapping.json}"
      LED_MQTT_CONNECT_RETRIES: "${LED_MQTT_CONNECT_RETRIES:-10}"
      LED_MQTT_CONNECT_RETRY_DELAY_MS: "${LED_MQTT_CONNECT_RETRY_DELAY_MS:-2000}"
      ADMIN_NAME_MATCH: "${ADMIN_NAME_MATCH:-Noah Tielmann}"
    ports:
      - "8082:8082"
    volumes:
      - sqlite-data:/data
      - led-mapping:/var/lib/warehousecore/led
    networks:
      - weidelbach
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ============================================================================
  # SQLite Backup Service - Daily automatic backups
  # ============================================================================
  db-backup:
    image: alpine:latest
    container_name: db-backup
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    volumes:
      - sqlite-data:/data
      - sqlite-backups:/backups
    environment:
      BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-7}"
      BACKUP_INTERVAL_HOURS: "${BACKUP_INTERVAL_HOURS:-24}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        apk add --no-cache sqlite
        
        backup_databases() {
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          echo "🔄 Starting backup at $$(date)"
          
          # Backup RentalCore
          if [ -f /data/rentalcore.db ]; then
            sqlite3 /data/rentalcore.db ".backup '/backups/rentalcore_$${TIMESTAMP}.db'"
            echo "✅ RentalCore backed up"
          fi
          
          # Backup WarehouseCore
          if [ -f /data/warehousecore.db ]; then
            sqlite3 /data/warehousecore.db ".backup '/backups/warehousecore_$${TIMESTAMP}.db'"
            echo "✅ WarehouseCore backed up"
          fi
          
          # Cleanup old backups
          find /backups -name "*.db" -mtime +$${BACKUP_RETENTION_DAYS:-7} -delete
          echo "🧹 Old backups cleaned up"
          
          # List current backups
          echo "📂 Current backups:"
          ls -lah /backups/*.db 2>/dev/null || echo "No backups found"
        }
        
        # Initial backup
        sleep 60  # Wait for databases to be ready
        backup_databases
        
        # Schedule regular backups
        while true; do
          sleep $${BACKUP_INTERVAL_HOURS:-24}h
          backup_databases
        done
    networks:
      - weidelbach

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT (plain)
      - "8883:8883"   # MQTT over TLS
      - "9001:9001"   # WebSocket (optional)
    volumes:
      - mosquitto-config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    environment:
      LED_MQTT_USER: "${LED_MQTT_USER:-leduser}"
      LED_MQTT_PASS: "${LED_MQTT_PASS:-ledpassword123}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /mosquitto/config
        if [ ! -f /mosquitto/config/mosquitto.conf ] || ! grep -q '^listener 1883' /mosquitto/config/mosquitto.conf 2>/dev/null; then
          cat <<'EOF' > /mosquitto/config/mosquitto.conf
        listener 1883 0.0.0.0
        allow_anonymous false
        password_file /mosquitto/config/passwd
        persistence true
        persistence_location /mosquitto/data/
        log_dest stdout
        listener 9001 0.0.0.0
        protocol websockets
        EOF
        fi
        if [ -n "$LED_MQTT_USER" ]; then
          if [ ! -f /mosquitto/config/passwd ]; then
            mosquitto_passwd -c -b /mosquitto/config/passwd "$LED_MQTT_USER" "$LED_MQTT_PASS"
          elif ! grep -q "^$LED_MQTT_USER:" /mosquitto/config/passwd 2>/dev/null; then
            mosquitto_passwd -b /mosquitto/config/passwd "$LED_MQTT_USER" "$LED_MQTT_PASS"
          fi
        fi
        exec /docker-entrypoint.sh /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
    networks:
      - weidelbach
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -u \"$LED_MQTT_USER\" -P \"$LED_MQTT_PASS\" -W 3"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  weidelbach:
    driver: bridge

volumes:
  # SQLite database files (shared between services)
  sqlite-data:
    driver: local
  # SQLite backup storage
  sqlite-backups:
    driver: local
  # LED mapping configuration
  led-mapping:
    driver: local
  # Mosquitto MQTT broker
  mosquitto-config:
  mosquitto-data:
  mosquitto-log:
